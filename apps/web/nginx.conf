server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any unmatched path (e.g. /jobs/123) serves index.html
    # so client-side routing (React Router / TanStack Router) can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
